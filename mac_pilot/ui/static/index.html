<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac Pilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bar" id="bar">
        <!-- Main bar row -->
        <div class="bar-main">
            <!-- Google Gemini star icon -->
            <div class="gemini-icon" id="gemini-icon">
                <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
                    <path d="M14 0C14 7.732 7.732 14 0 14c7.732 0 14 6.268 14 14 0-7.732 6.268-14 14-14-7.732 0-14-6.268-14-14Z" fill="url(#gemini-gradient)"/>
                    <defs>
                        <linearGradient id="gemini-gradient" x1="0" y1="0" x2="28" y2="28">
                            <stop offset="0%" stop-color="#4285F4"/>
                            <stop offset="50%" stop-color="#9B72CB"/>
                            <stop offset="100%" stop-color="#D96570"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>

            <input type="text" class="input" id="input" placeholder="Ask Mac Pilot anything..." autocomplete="off" spellcheck="false" />

            <canvas id="waveform" width="80" height="28"></canvas>

            <div class="status-pill" id="status-pill">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Ready</span>
            </div>

            <!-- Mic button -->
            <button class="btn mic-btn" id="mic-btn" title="Voice input">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
                    <path d="M5 11a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="9" y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>

            <!-- Stop button (hidden by default) -->
            <button class="btn stop-btn" id="stop-btn" title="Stop" style="display:none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                </svg>
            </button>

            <!-- Send button -->
            <button class="btn send-btn" id="send-btn" title="Send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
                </svg>
            </button>
        </div>

        <!-- Setup banner -->
        <div class="setup-banner" id="setup-banner" style="display:none;">
            <div class="separator"></div>
            <div class="setup-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbc05" stroke-width="2" stroke-linecap="round"><path d="M12 9v4m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
                <span class="setup-text">Google Workspace not connected</span>
                <button class="setup-btn" id="connect-google-btn">Connect</button>
            </div>
        </div>

        <!-- Expandable detail panel -->
        <div class="detail-panel" id="detail-panel">
            <div class="separator"></div>
            <div class="task-row" id="task-row">
                <span class="task-label" id="task-label"></span>
            </div>
            <div class="steps-list" id="steps-list"></div>
            <div class="result-row" id="result-row">
                <div class="result-text" id="result-text"></div>
                <div class="result-stats" id="result-stats"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
